<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Echo | Decentralized Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #090909; color: #fff; font-family: 'Inter', sans-serif; }
        .player-gradient { background: linear-gradient(180deg, rgba(29, 185, 84, 0.2) 0%, rgba(9, 9, 9, 1) 100%); }
        .card-hover:hover { background: rgba(255, 255, 255, 0.05); transform: translateY(-5px); }
    </style>
</head>
<body class="flex min-h-screen">
    <aside class="w-64 border-r border-white/10 p-6 flex flex-col gap-8">
        <h1 class="text-2xl font-bold text-[#1DB954]">ECHO</h1>
        <nav class="space-y-4 text-slate-400 font-semibold">
            <p class="text-white">Home</p>
            <p class="hover:text-white cursor-pointer">Discover</p>
            <p class="hover:text-white cursor-pointer">Your Library</p>
        </nav>
        <button id="connect-btn" class="mt-auto bg-white text-black py-2 rounded-full font-bold text-sm">Connect Wallet</button>
    </aside>

    <main class="flex-1 player-gradient p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold">Trending Now</h2>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="card-hover p-4 rounded-xl transition-all duration-300 cursor-pointer">
                <div class="aspect-square bg-gradient-to-br from-purple-600 to-blue-500 rounded-lg shadow-2xl mb-4 relative group">
                    <button class="absolute bottom-2 right-2 bg-[#1DB954] p-3 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">▶️</button>
                </div>
                <h3 class="font-bold">Neon Genesis</h3>
                <p class="text-sm text-slate-400">Cyber-Producer</p>
                <button onclick="tip()" class="mt-3 w-full border border-white/20 py-1 rounded-full text-xs hover:border-[#1DB954]">Tip 0.001 ETH</button>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-black/90 backdrop-blur-md border-t border-white/10 p-4 flex justify-between items-center px-12">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-slate-800 rounded"></div>
            <div>
                <p class="text-sm font-bold">Currently Playing...</p>
                <p class="text-xs text-slate-400">Connect to load track</p>
            </div>
        </div>
        <div class="flex gap-6">⏮️ ⏸️ ⏭️</div>
        <div class="text-xs text-slate-400">Volume: 80%</div>
    </footer>

    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <script>
        const btn = document.getElementById('connect-btn');
        btn.onclick = async () => {
            if(window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                btn.innerText = accounts[0].slice(0,6) + "...";
                btn.classList.replace('bg-white', 'bg-[#1DB954]');
            }
        };

        async function tip() {
            alert("Transaction Initiated: 0.001 ETH Tip to Artist");
        }
    </script>
</body>
</html>
