<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Echo | Decentralized Streaming</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex">
    <aside class="w-64 h-screen border-r border-white/10 p-6">
        <h1 class="text-2xl font-bold text-[#1DB954] mb-10">ECHO</h1>
        <button id="connect-btn" class="w-full bg-white text-black py-2 rounded-full font-bold">Connect Wallet</button>
    </aside>

    <main class="flex-1 player-gradient p-10">
        <div class="grid grid-cols-4 gap-6">
            <div class="music-card">
                <div class="relative bg-gradient-to-br from-green-400 to-blue-500 aspect-square rounded-lg mb-4">
                    <div class="play-btn-float text-black">▶️</div>
                </div>
                <h3 class="font-bold">Protocol Beats</h3>
                <p class="text-sm text-gray-400">Web3 Artist</p>
                <button onclick="sendTip(0)" class="mt-4 text-xs border border-gray-600 px-4 py-1 rounded-full hover:border-[#1DB954]">Tip 0.001 ETH</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <script src="../src/app.js"></script>
</body>
</html>
